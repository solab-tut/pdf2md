services:
  ollama:
    image: ollama/ollama:latest
    container_name: pdf2md-ollama
    restart: unless-stopped
    ports:
      - "0.0.0.0:3201:11434"
    volumes:
      - ./ollama-data:/root/.ollama
    environment:
      - TZ=Asia/Tokyo
      - OLLAMA_KEEP_ALIVE=15m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_ORIGINS=*
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_CONTEXT_LENGTH=32768
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pdf2md:
    build: ./backend
    container_name: pdf2md
    restart: unless-stopped
    ports:
      - "0.0.0.0:3200:3200"
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/app.py:/app/app.py:ro
      - ./backend/static:/app/static:ro
      - ./backend/providers:/app/providers:ro
    depends_on:
      - ollama
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
