services:
  pdf2md:
    build: ./backend
    container_name: pdf2md
    restart: unless-stopped
    ports:
      - "0.0.0.0:3200:3200"
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/app.py:/app/app.py:ro
      - ./backend/static:/app/static:ro
      - ./backend/providers:/app/providers:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
